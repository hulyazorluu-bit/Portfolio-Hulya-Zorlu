<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Event App — Hulya Zorlu</title>
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #000; }
    img {
      display: block;
      width: 100%;
    }
    .figma-link {
      display: block;
      text-align: center;
      padding: 2.5rem;
      font-family: 'Courier New', monospace;
      font-size: 1.1rem;
      letter-spacing: 0.1em;
      text-transform: uppercase;
      color: rgba(255,255,255,0.5);
      text-decoration: none;
      background: #000;
      transition: color 0.2s;
    }
    .figma-link:hover { color: #fff; }
  </style>
</head>
<body>
  <img id="brief-img" src="" alt="Event App — Brief">
  <a class="figma-link" href="https://www.figma.com/design/GTOusKG5gaMvX1fJP46EqT/Event-app?node-id=48-2&p=f&t=OzlAY1Zyzr9ujeME-0" target="_blank" rel="noopener">
    <span id="figma-link-txt">View Project on Figma ↗</span>
  </a>
  <script>
    const lang = localStorage.getItem('lang') || 'en';
    document.getElementById('brief-img').src = lang === 'fr' ? 'assets/briefFR.png' : 'assets/briefEN.png';
    document.getElementById('figma-link-txt').textContent = lang === 'fr' ? 'Voir le projet sur Figma ↗' : 'View Project on Figma ↗';
  </script>
</body>
</html>
